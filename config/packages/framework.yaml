# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    
    # 🛡️ PROTECTION CSRF
    # Empêche les attaques par falsification de requête intersites
    csrf_protection: true

    # ⏳ RATE LIMITER
    # On définit ici les limites pour protéger tes formulaires (ex: inscription)
    rate_limiter:
        inscription_limiter:
            policy: 'fixed_window'
            limit: 5             # Maximum 5 essais
            interval: '15 minutes' # Pendant une fenêtre de 15 minutes

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file